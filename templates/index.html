<!DOCTYPE html>
<html>
<head>
    <title>PulsePlay</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 60px;
            color: #1db954;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        input {
            width: 300px;
            padding: 15px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
            background: #2a2a2a;
            color: white;
        }

        button {
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            background: #1db954;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #1ed760;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<div class="container">
    <h1>PulsePlay 🎧</h1>
    <p>Feel the beat. Control the vibe.</p>

    <form action="/search">
        <input type="text" name="q" placeholder="Search your favorite song..." required>
        <button type="submit">Play</button>
    </form>
</div>

</body>
</html>
