<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - PulsePlay</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        img {
            width: 300px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        audio {
            width: 100%;
            max-width: 400px;
        }
        a {
            margin-top: 20px;
            color: #1db954;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <img src="{{ thumbnail }}" alt="Thumbnail">
    <h2>{{ title }}</h2>

    <audio controls autoplay>
        <source src="/stream?v={{ video_id }}" type="audio/webm">
        Your browser does not support the audio element.
    </audio>

    <a href="/">← Search again</a>
</body>
</html>
