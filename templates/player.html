<!DOCTYPE html>
<html>
<head>
    <title>PulsePlay</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #1db954;
        }

        .thumbnail {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            margin: 20px 0;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);

            /* 🔥 rotation setup */
            animation: spin 5s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 30px;
            border: none;
            background: #1db954;
            color: white;
            cursor: pointer;
        }

        input[type=range] {
            width: 300px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>PulsePlay 🎧</h1>
    <p>{{ title }}</p>

    <img src="{{ thumbnail }}" class="thumbnail" id="thumb">

   <iframe 
  width="560" height="315"
  src="https://www.youtube.com/embed/{{ video_id }}"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

    <div>
        <button onclick="playSong()">▶</button>
        <button onclick="pauseSong()">⏸</button>
    </div>

    <input type="range" id="progress" value="0">

    <p>
        <span id="current">0:00</span> /
        <span id="duration">0:00</span>
    </p>

</div>

<script>
    let audio = document.getElementById("audio");
    let progress = document.getElementById("progress");
    let thumb = document.getElementById("thumb");

    // ▶️ AUTO PLAY + ROTATION
    audio.addEventListener("play", () => {
        thumb.style.animationPlayState = "running";
        setupMediaSession();
    });

    // ⏸ PAUSE ROTATION (STOPS EXACT POSITION)
    audio.addEventListener("pause", () => {
        thumb.style.animationPlayState = "paused";
    });

    function playSong() {
        audio.play();
    }

    function pauseSong() {
        audio.pause();
    }

    // 🎧 MEDIA SESSION (LOCK SCREEN)
    function setupMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: "{{ title }}",
                artist: "PulsePlay",
                artwork: [
                    { src: "{{ thumbnail }}", sizes: "512x512", type: "image/png" }
                ]
            });

            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('seekbackward', () => {
                audio.currentTime -= 10;
            });
            navigator.mediaSession.setActionHandler('seekforward', () => {
                audio.currentTime += 10;
            });
        }
    }

    // Progress bar
    audio.addEventListener("timeupdate", () => {
        progress.value = (audio.currentTime / audio.duration) * 100;
        document.getElementById("current").innerText = formatTime(audio.currentTime);
    });

    audio.addEventListener("loadedmetadata", () => {
        document.getElementById("duration").innerText = formatTime(audio.duration);
    });

    progress.addEventListener("input", () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
    });

    function formatTime(time) {
        let min = Math.floor(time / 60);
        let sec = Math.floor(time % 60);
        if (sec < 10) sec = "0" + sec;
        return min + ":" + sec;
    }
</script>

</body>
</html>
