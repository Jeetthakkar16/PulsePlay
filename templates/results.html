<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results for "{{ query }}" - PulsePlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 6px;
            color: #1db954;
        }
        .subtitle {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: none;
            background: #282828;
            color: white;
            font-size: 1rem;
        }
        .search-bar button {
            padding: 12px 20px;
            border-radius: 24px;
            border: none;
            background: #1db954;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .song-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: background 0.2s;
        }
        .song-card:hover {
            background: #2a2a2a;
        }
        .song-card img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .song-info {
            flex: 1;
            overflow: hidden;
        }
        .song-title {
            font-size: 1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1db954;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <h1>PulsePlay 🎵</h1>
    <p class="subtitle">Results for "{{ query }}"</p>

    <form class="search-bar" action="/search" method="get">
        <input type="text" name="q" placeholder="Search another song..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>

    <div class="song-list">
        {% for song in songs %}
        <a class="song-card" href="/play?title={{ song.title | urlencode }}&artist={{ song.artist | urlencode }}&thumbnail={{ song.thumbnail | urlencode }}&audio_url={{ song.audio_url | urlencode }}">
            <img src="{{ song.thumbnail }}" alt="{{ song.title }}" onerror="this.src='https://via.placeholder.com/64x64/282828/aaa?text=♪'">
            <div class="song-info">
                <div class="song-title">{{ song.title }}</div>
                <div class="song-artist">{{ song.artist }}</div>
            </div>
            <div class="play-btn">▶</div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
